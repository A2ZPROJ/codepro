name: Build and Release

# Só execução MANUAL. O release oficial é publicado do notebook (ACER) via
# `npm run build:publish`, que embute a DLL do Civil compilada localmente —
# isso NÃO é reproduzível num runner limpo do GitHub. O gatilho automático em
# tag `v*` falhava em todo release; por isso virou workflow_dispatch-only.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:publish
