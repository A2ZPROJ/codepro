name: CI — Testes (vitest)

# Roda a suíte de testes a cada push/PR na main. NÃO publica nada (o publish
# fica no build.yml, disparado por tag v*). Objetivo: pegar regressão no parser
# de OSE / conferência / export antes de virar release.

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Testes (vitest)
        run: npm test
